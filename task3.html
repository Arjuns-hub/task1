<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

//🔹 1. User Input

let name = prompt("Enter your name:");

let age = Number(prompt("Enter your age:"));

let salary = Number(prompt("Enter your monthly salary:"));

let loan = Number(prompt("Enter your loan amount:"));

console.log("Name: " + name);
console.log("Age: " + age);
console.log("Monthly Salary: " + salary);
console.log("Loan Amount: " + loan);

//🔹 2. Eligibility Check (Logical Operators)Conditions:

if (age>=21 && age<=60 && salary>=25000) {
    console.log("ELIGIBLE");
}else{
    console.log("NOT Eligible");
    
}

//🔹 3. EMI Calculation (Operators)Formula:

let emi=loan/12;

//🔹 4. Loan Category (If-Else)

if (loan > 500000) {
    console.log("High Loan");
} 
else if (loan > 200000) {
    console.log("Medium Loan");
} 
else {
    console.log("Low Loan");
}

//🔹 5. Risk Level (Ternary Operator)

let risk = (salary > 50000) ? "Low Risk" : "High Risk";

console.log(risk);

//🔹 6. Customer Type (Switch)

switch (true) {
    case (emi>40000):
    console.log("premium Customer");
    break;
    
    case (emi>20000):
    console.log("standard Customer");
    break;

    default:
        console.log("Basic Customer");

}

    </script>
</body>
</html>
